<body>
 
<div class="wrap">
 
  <header class="board-header">
    <span class="live-dot" aria-hidden="true"></span>
    <div class="brand">
      <span class="brand-eyebrow">Odds Board</span>
      <h1>คำนวณราคาบอล</h1>
    </div>
  </header>
 
  <section class="panel stake-panel">
    <label for="stake">เงินเดิมพัน</label>
    <div class="stake-input-row" id="stakeInputRow">
      <input type="number" id="stake" inputmode="decimal" placeholder="0.00" autocomplete="off">
      <span class="unit">บาท</span>
    </div>
    <div class="field-msg" id="stakeMsg"></div>
  </section>
 
  <section class="panel odds-panel">
    <div class="panel-title-row">
      <h2>รายการคู่บอล</h2>
      <span class="panel-sub">สูงสุด 10 คู่ · เว้นว่างได้</span>
    </div>
    <div class="odds-grid" id="oddsGrid"></div>
  </section>
 
  <div class="actions">
    <button class="btn-calc" id="calcBtn" type="button">⚡ คำนวณ</button>
    <button class="btn-reset" id="resetBtn" type="button">↺ ล้างข้อมูล</button>
  </div>
 
  <section class="panel result-panel" id="resultPanel">
    <div class="idle-state">กรอกข้อมูลแล้วกด "คำนวณ"</div>
  </section>
 
</div>
 
<script>
  const ODDS_COUNT = 10;
 
  function buildOddsGrid(){
    const grid = document.getElementById('oddsGrid');
    let html = '';
    for(let i=1;i<=ODDS_COUNT;i++){
      html += `
        <div class="odds-row">
          <span class="odds-badge">${String(i).padStart(2,'0')}</span>
          <input type="number" step="0.001" inputmode="decimal" id="odd${i}" placeholder="เว้นว่างได้" autocomplete="off">
        </div>`;
    }
    grid.innerHTML = html;
  }
 
  function setupNavigation(){
    const stakeEl = document.getElementById('stake');
    stakeEl.addEventListener('keydown', e=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        document.getElementById('odd1').focus();
      }
    });
    stakeEl.addEventListener('input', clearStakeError);
 
    for(let i=1;i<=ODDS_COUNT;i++){
      const el = document.getElementById('odd'+i);
      el.addEventListener('keydown', e=>{
        if(e.key === 'Enter'){
          e.preventDefault();
          if(i < ODDS_COUNT){
            document.getElementById('odd'+(i+1)).focus();
          }else{
            calculate();
          }
        }
      });
    }
  }
 
  function fmtMoney(n){
    return n.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
 
  // Implied win probability from decimal odds: 1/odds * 100
  function winPct(odds){
    return (1/odds) * 100;
  }
 
  function fmtPct(p){
    // more decimals for very small probabilities (long combos), 1 decimal otherwise
    return p < 1 ? p.toFixed(2) : p.toFixed(1);
  }
 
  function winTier(p){
    if(p >= 50) return 'high';
    if(p >= 25) return 'mid';
    return 'low';
  }
 
  function clearStakeError(){
    const row = document.getElementById('stakeInputRow');
    row.classList.remove('input-error','shake');
    document.getElementById('stakeMsg').textContent = '';
  }
 
  function idleStateHtml(){
    return `<div class="idle-state">กรอกข้อมูลแล้วกด "คำนวณ"</div>`;
  }
 
  function calculate(){
    const stakeEl = document.getElementById('stake');
    const row = document.getElementById('stakeInputRow');
    const stake = parseFloat(stakeEl.value);
    const resultPanel = document.getElementById('resultPanel');
 
    clearStakeError();
 
    if(isNaN(stake) || stake <= 0){
      row.classList.add('input-error');
      requestAnimationFrame(()=> row.classList.add('shake'));
      document.getElementById('stakeMsg').textContent = 'กรุณาใส่เงินเดิมพัน';
      stakeEl.focus();
      return;
    }
 
    let totalOdds = 1;
    let count = 0;
    let singlesHtml = '';
 
    for(let i=1;i<=ODDS_COUNT;i++){
      const odd = parseFloat(document.getElementById('odd'+i).value);
      if(!isNaN(odd) && odd > 0){
        count++;
        const payout = stake * odd;
        const profit = payout - stake;
        totalOdds *= odd;
 
        const pct = winPct(odd);
        const tier = winTier(pct);
 
        singlesHtml += `
          <div class="single-row">
            <span class="single-badge">${String(i).padStart(2,'0')}</span>
            <div class="single-info">
              <span class="single-odds">@ ${odd.toFixed(3)}</span>
              <span class="single-winrate tier-${tier}">ชนะ ${fmtPct(pct)}%</span>
            </div>
            <span class="single-payout">${fmtMoney(payout)} ฿</span>
            <span class="single-profit ${profit>=0?'is-pos':'is-neg'}">${profit>=0?'+':''}${fmtMoney(profit)}</span>
          </div>`;
      }
    }
 
    if(count === 0){
      resultPanel.classList.remove('flicker');
      resultPanel.innerHTML = `<div class="idle-state is-error">⚠️ กรุณาใส่ Odds อย่างน้อย 1 คู่</div>`;
      return;
    }
 
    const totalPayout = stake * totalOdds;
    const totalProfit = totalPayout - stake;
    const comboPct = winPct(totalOdds);
    const comboTier = winTier(comboPct);
    const comboColorClass = comboTier === 'high' ? 'combo-value--green' : comboTier === 'mid' ? 'combo-value--amber' : 'combo-value--red';
 
    resultPanel.classList.remove('flicker');
    resultPanel.innerHTML = `
      <div class="result-block">
        <div class="result-title-row"><h2>บอลเดี่ยว</h2></div>
        <div class="singles-list">${singlesHtml}</div>
      </div>
      <div class="combo-hero">
        <span class="combo-eyebrow">🔥 บอลชุด · ${count} คู่</span>
        <div class="combo-figure combo-figure--main">
          <span class="combo-label">Odds รวม</span>
          <span class="combo-value">${totalOdds.toFixed(3)}</span>
        </div>
        <div class="combo-stats">
          <div class="combo-figure">
            <span class="combo-label">รับรวม</span>
            <span class="combo-value combo-value--green">${fmtMoney(totalPayout)} ฿</span>
          </div>
          <div class="combo-figure">
            <span class="combo-label">กำไร</span>
            <span class="combo-value ${totalProfit>=0?'combo-value--green':'combo-value--red'}">${totalProfit>=0?'+':''}${fmtMoney(totalProfit)} ฿</span>
          </div>
          <div class="combo-figure">
            <span class="combo-label">โอกาสชนะรวม</span>
            <span class="combo-value ${comboColorClass}">${fmtPct(comboPct)}%</span>
          </div>
        </div>
      </div>
    `;
 
    void resultPanel.offsetWidth;
    resultPanel.classList.add('flicker');
  }
 
  function resetAll(){
    document.getElementById('stake').value = '';
    for(let i=1;i<=ODDS_COUNT;i++){
      document.getElementById('odd'+i).value = '';
    }
    clearStakeError();
    document.getElementById('resultPanel').classList.remove('flicker');
    document.getElementById('resultPanel').innerHTML = idleStateHtml();
    document.getElementById('stake').focus();
  }
 
  buildOddsGrid();
  setupNavigation();
  document.getElementById('calcBtn').addEventListener('click', calculate);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
</script>
 
</body>
</html>
